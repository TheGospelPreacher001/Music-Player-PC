<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Music Player</title>
<style>
/* Body & Layout */
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #0d0d0d;
    color: #fff;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Top-right clickable link */
#top-right-channel {
    position: fixed;
    top: 10px;
    right: 20px;
    z-index: 1000;
}
#top-channel-link {
    color: #0ff;
    font-weight: bold;
    font-size: 1.2em;
    text-decoration: none;
    text-shadow: 0 0 5px #0ff;
    transition: all 0.3s ease;
}
#top-channel-link:hover {
    color: #f0f;
    text-shadow: 0 0 10px #f0f, 0 0 20px #0ff;
}

/* Sidebar */
#sidebar {
    width: 240px;
    background: #111;
    border-right: 2px solid #0ff;
    padding: 20px;
    overflow-y: auto;
}
#sidebar h2 {
    color: #0ff;
    text-align: center;
    margin-bottom: 20px;
}
#sidebar ul {
    list-style: none;
    padding: 0;
}
#sidebar li {
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    background: #111;
    color: #0ff;
    border-radius: 8px;
    text-shadow: 0 0 5px #0ff;
    transition: all 0.3s ease;
}
#sidebar li:hover {
    background: #222;
    color: #f0f;
    text-shadow: 0 0 10px #f0f;
}

/* Main player */
#main-player {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
#player-container {
    background: linear-gradient(135deg, #0ff, #f0f);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 40px #0ff, 0 0 80px #f0f;
    width: 80%;
    max-width: 500px;
    text-align: center;
    position: relative;
}

/* Current track */
#currentTrackName {
    color: #0ff;
    font-size: 1.2em;
    margin-bottom: 20px;
}

/* Player buttons */
.player-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}
button.control {
    background: #0ff;
    border: none;
    color: #0d0d0d;
    font-size: 18px;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}
button.control:hover {
    transform: scale(1.1);
}

/* Progress bar */
#progressContainer {
    width: 100%;
    height: 10px;
    background: #111;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 10px;
    position: relative;
}
#progressBar {
    width: 0%;
    height: 100%;
    background: #f0f;
    border-radius: 10px;
}
#time-display {
    display: flex;
    justify-content: space-between;
    color: #0ff;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Volume and Playback */
#controls-group {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}
.control-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.control-item label {
    color: #0ff;
    margin-bottom: 5px;
    font-weight: bold;
}
.control-item input,
.control-item select {
    width: 120px;
}

/* Responsive */
@media (max-width: 800px) {
    body { flex-direction: column; overflow-y: auto; }
    #sidebar { width: 100%; max-height: 200px; display: flex; overflow-x: auto; overflow-y: hidden; }
    #sidebar ul { display: flex; gap: 10px; }
    #sidebar li { min-width: 150px; flex-shrink: 0; }
    #main-player { width: 100%; }
}
</style>
</head>
<body>

<!-- Top-right clickable link -->
<div id="top-right-channel">
    <a href="https://youtube.com/@thegospelpreacherministries?si=TtKJ5HLXuYd4Ixf6" target="_blank" id="top-channel-link">
        The Gospel Preacher Ministries
    </a>
</div>

<!-- Sidebar -->
<div id="sidebar">
    <h2>Playlist</h2>
    <ul id="sidebar-playlist"></ul>
</div>

<!-- Main player -->
<div id="main-player">
    <div id="player-container">
        <p id="currentTrackName">Select a song to play</p>

        <div class="player-buttons">
            <button class="control" id="shuffleBtn">In Order</button>
            <button class="control" id="prevBtn">Previous</button>
            <button class="control" id="playPauseBtn">▶</button>
            <button class="control" id="nextBtn">Next</button>
            <button class="control" id="repeatBtn">Repeat Off</button>
        </div>

        <div id="progressContainer"><div id="progressBar"></div></div>
        <div id="time-display"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>

        <div id="controls-group">
            <div class="control-item">
                <label for="volumeSlider">Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>
            <div class="control-item">
                <label for="playbackSpeed">Playback Speed</label>
                <select id="playbackSpeed">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </div>
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
// Playlist
let playlist = [
"A Way to Escape.mp3",
"A Wedding Invitation.mp3",
"Beautiful Star of Bethlehem.mp3",
"Born To Serve the Lord.mp3",
"East from the West.mp3",
"Everybody Will be Happy.mp3",
"God Handled It All.mp3",
"Happy Home Above.mp3",
"He Can Move the Highest Mountain.mp3",
"He'll Be To You.mp3","Home in Heaven.mp3",
"I Can Go In.mp3",
"I Know a Man Who Can.mp3",
"I Serve A God.mp3",
"I Want to Sing.mp3",
"I Won't Turn Back.mp3",
"I've Got That Old Time Religion.mp3",
"I've Never Been Sorry.mp3",
"I'm Too Far From Where I Started.mp3",
"It Pays to Serve the Lord.mp3",
"Jesus Signed My Pardon.mp3",
"Love Grew Where the Blood Fell.mp3",
"Mansion over the Hiltop.mp3",
"No Regrets.mp3",
"Only Jesus Satisfies.mp3",
"One of His Own.mp3",
"Show a Little Bit of Love and Kindness.mp3",
"The Blood is Still There.mp3",
"The Old Gospel Ship.mp3",
"There's a Record Book.mp3",
"They Came Out Serving God.mp3"
];
let sortedPlaylist = [...playlist].sort((a,b)=>a.localeCompare(b));

// Player state
let currentTrack = 0;
let isPlaying = false;
let isShuffled = false;
let repeatMode = 0;
let shuffleHistory = [];

const audioPlayer = document.getElementById("audioPlayer");
const sidebarPlaylist = document.getElementById("sidebar-playlist");
const currentTrackName = document.getElementById("currentTrackName");
const playPauseBtn = document.getElementById("playPauseBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const shuffleBtn = document.getElementById("shuffleBtn");
const repeatBtn = document.getElementById("repeatBtn");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");
const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");
const volumeSlider = document.getElementById("volumeSlider");
const playbackSpeed = document.getElementById("playbackSpeed");

// Build sidebar
sortedPlaylist.forEach(song => {
    const li = document.createElement("li");
    li.textContent = song;
    li.onclick = () => playSelectedTrackByName(song);
    sidebarPlaylist.appendChild(li);
});

function playSelectedTrackByName(songName){
    currentTrack = playlist.indexOf(songName);
    playTrack();
}

function playTrack(){
    audioPlayer.src = playlist[currentTrack];
    audioPlayer.playbackRate = 1;
    playbackSpeed.value = 1;
    audioPlayer.play();
    isPlaying = true;
    currentTrackName.textContent = "Now Playing: " + playlist[currentTrack];
    updatePlayButton();
    if(isShuffled){
        if(shuffleHistory[shuffleHistory.length-1] !== currentTrack){
            shuffleHistory.push(currentTrack);
        }
    }
}

function togglePlayPause(){
    if(!audioPlayer.src){
        currentTrack = 0;
        playTrack();
    } else if(audioPlayer.paused){
        audioPlayer.play(); isPlaying = true;
    } else { audioPlayer.pause(); isPlaying = false; }
    updatePlayButton();
}

function updatePlayButton(){ playPauseBtn.textContent = isPlaying ? "❚❚" : "▶"; }

function prevTrack(){
    if(isShuffled){
        if(shuffleHistory.length > 1){
            shuffleHistory.pop();
            currentTrack = shuffleHistory[shuffleHistory.length-1];
        } else currentTrack = shuffleHistory[0] || currentTrack;
    } else currentTrack = (currentTrack-1+playlist.length)%playlist.length;
    playTrack();
}

function nextTrack(){
    if(isShuffled){
        let next;
        do { next = Math.floor(Math.random() * playlist.length); }
        while(next === currentTrack && playlist.length>1);
        currentTrack = next;
    } else currentTrack = (currentTrack+1)%playlist.length;
    playTrack();
}

// Shuffle
shuffleBtn.addEventListener("click", ()=>{
    isShuffled=!isShuffled;
    shuffleBtn.textContent=isShuffled?"Shuffle":"In Order";
    if(isShuffled) shuffleHistory=[currentTrack];
});

// Repeat
repeatBtn.addEventListener("click", ()=>{
    repeatMode=(repeatMode+1)%3;
    repeatBtn.textContent=repeatMode===0?"Repeat Off":repeatMode===1?"Repeat All":"Repeat Current Track";
});

// Progress dragging
let isDragging = false;
progressContainer.addEventListener("mousedown", e=>{ isDragging = true; setProgress(e); });
progressContainer.addEventListener("mousemove", e=>{ if(isDragging) setProgress(e); });
progressContainer.addEventListener("mouseup", e=>{ if(isDragging){ setProgress(e); isDragging=false; } });
progressContainer.addEventListener("mouseleave", e=>{ if(isDragging){ setProgress(e); isDragging=false; } });
function setProgress(e){
    const rect = progressContainer.getBoundingClientRect();
    const pos = (e.clientX - rect.left)/rect.width;
    audioPlayer.currentTime = pos*audioPlayer.duration;
}

// Update progress
audioPlayer.addEventListener("timeupdate",()=>{
    if(!audioPlayer.duration) return;
    progressBar.style.width=(audioPlayer.currentTime/audioPlayer.duration)*100+"%";
    currentTimeEl.textContent=formatTime(audioPlayer.currentTime);
    durationEl.textContent=formatTime(audioPlayer.duration);
});
function formatTime(sec){ const m=Math.floor(sec/60); const s=Math.floor(sec%60); return `${m}:${s<10?"0":""}${s}`; }

// Volume & speed
volumeSlider.addEventListener("input",()=>{audioPlayer.volume=volumeSlider.value; localStorage.setItem("volume",volumeSlider.value);});
playbackSpeed.addEventListener("change",()=>{audioPlayer.playbackRate=playbackSpeed.value;});
window.onload=()=>{
    const vol=localStorage.getItem("volume");
    if(vol){audioPlayer.volume=vol; volumeSlider.value=vol;}
};

// Button events
playPauseBtn.addEventListener("click",togglePlayPause);
prevBtn.addEventListener("click",prevTrack);
nextBtn.addEventListener("click",nextTrack);

// Auto next
audioPlayer.addEventListener("ended",()=>{
    if(repeatMode===2) playTrack();
    else if(currentTrack===playlist.length-1){
        if(repeatMode===1){ currentTrack=0; playTrack();}
        else {isPlaying=false; updatePlayButton();}
    } else nextTrack();
});
</script>
</body>
</html>
