<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            color: #333;
            margin: 20px;
        }

        #player-container {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }

        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 10px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #e1004b;
            transform: scale(1.1);
        }

        #playlist {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #playlist li {
            cursor: pointer;
            padding: 12px;
            background: #00bcd4;
            margin: 8px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            transition: background 0.3s ease;
        }

        #playlist li:hover {
            background: #008c95;
        }

        h1 {
            color: #ff6347;
            font-size: 2.5em;
        }

        h3 {
            color: #ff9800;
            font-size: 1.8em;
        }

        #search-bar {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        #search-bar input {
            padding: 10px;
            font-size: 16px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        #search-results {
            position: absolute;
            right: 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 250px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
        }

        #search-results div {
            padding: 10px;
            cursor: pointer;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
        }

        #search-results div:hover {
            background: #efefef;
        }

        /* Mobile-friendly layout */
        @media (max-width: 600px) {
            #search-bar {
                position: static;
                margin-bottom: 15px;
            }

            button {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<h1>Music Player</h1>

<div id="search-bar">
    <input type="text" id="searchInput" placeholder="Search for a song..." oninput="searchSongs()">
    <div id="search-results"></div>
</div>

<div id="player-container">

    <audio id="audioPlayer" controls></audio>

    <p id="currentTrackName" style="color:white;"></p>

    <button onclick="playPause()">Play / Pause</button>
    <button onclick="prevTrack()">Previous</button>
    <button onclick="nextTrack()">Next</button>
    <button id="shuffleBtn" onclick="shufflePlaylist()">Mix Off</button>
    <button id="repeatBtn" onclick="toggleRepeat()">Repeat Off</button>
    <button id="alphabetizeBtn" onclick="toggleAlphabetize()">Alphabetize Off</button>

    <br><br>

    <!-- Volume -->
    <label style="color:white;">Volume</label><br>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">

    <br><br>

    <h3>Playlist</h3>
    <ul id="playlist"></ul>

</div>

<script>
    let playlist = [
        "A Way to Escape.mp3",
        "Only Jesus Satisfies.mp3",
        "Jesus Signed My Pardon.mp3",
        "Mansion over the Hiltop.mp3",
        "Love Grew Where the Blood Fell.mp3",
        "One of His Own.mp3",
        "The Old Gospel Ship.mp3",
        "I've Never Been Sorry.mp3",
        "I'm Too Far From Where I Started.mp3",
        "I Want to Sing.mp3",
        "I Won't Turn Back.mp3",
        "I Know a Man Who Can.mp3",
        "Home in Heaven.mp3",
        "He Can Move the Highest Mountain.mp3",
        "Happy Home Above.mp3",
        "He'll Be To You.mp3",
        "Everybody Will be Happy.mp3",
        "East from the West.mp3",
        "They Came Out Serving God.mp3",
        "There Is.mp3",
        "I've Got That Old Time Religion.mp3",
        "No Regrets.mp3",
        "I Serve A God.mp3",
        "It Pays to Serve the Lord.mp3",
        "Born To Serve the Lord.mp3"
    ];

    let currentTrack = 0;
    let isShuffled = false;
    let repeatMode = false;
    let isAlphabetized = false;
    let shuffledPlaylist = [...playlist];

    const audioPlayer = document.getElementById("audioPlayer");
    const playlistElement = document.getElementById("playlist");
    const shuffleButton = document.getElementById("shuffleBtn");
    const repeatButton = document.getElementById("repeatBtn");
    const alphabetizeButton = document.getElementById("alphabetizeBtn");
    const searchResults = document.getElementById("search-results");
    const volumeSlider = document.getElementById("volumeSlider");
    const progressBar = document.getElementById("progressBar");

    function loadPlaylist() {
        playlistElement.innerHTML = "";
        (isShuffled ? shuffledPlaylist : playlist).forEach((track, index) => {
            const li = document.createElement("li");
            li.textContent = track;
            li.onclick = () => playSelectedTrack(index);
            playlistElement.appendChild(li);
        });
    }

    function playSelectedTrack(index) {
        currentTrack = index;
        const list = isShuffled ? shuffledPlaylist : playlist;
        audioPlayer.src = list[currentTrack];
        document.getElementById("currentTrackName").textContent =
            "Now Playing: " + list[currentTrack];
        audioPlayer.play();
    }

    function playPause() {
        audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
    }

    function nextTrack() {
        if (repeatMode) {
            audioPlayer.currentTime = 0;
        } else {
            currentTrack = (currentTrack + 1) %
                (isShuffled ? shuffledPlaylist.length : playlist.length);
        }
        playSelectedTrack(currentTrack);
    }

    function prevTrack() {
        currentTrack =
            (currentTrack - 1 + (isShuffled ? shuffledPlaylist.length : playlist.length)) %
            (isShuffled ? shuffledPlaylist.length : playlist.length);
        playSelectedTrack(currentTrack);
    }

    function shufflePlaylist() {
        isShuffled = !isShuffled;
        shuffleButton.textContent = isShuffled ? "Mix On" : "Mix Off";
        shuffledPlaylist = [...playlist].sort(() => Math.random() - 0.5);
        loadPlaylist();
    }

    function toggleRepeat() {
        repeatMode = !repeatMode;
        repeatButton.textContent = repeatMode ? "Repeat On" : "Repeat Off";
    }

    function toggleAlphabetize() {
        isAlphabetized = !isAlphabetized;
        alphabetizeButton.textContent =
            isAlphabetized ? "Alphabetize On" : "Alphabetize Off";
        playlist.sort();
        loadPlaylist();
    }

    function searchSongs() {
        const query = searchInput.value.toLowerCase();
        searchResults.innerHTML = "";
        if (!query) return;
        playlist.filter(song => song.toLowerCase().includes(query))
            .forEach(song => {
                const div = document.createElement("div");
                div.textContent = song;
                div.onclick = () => {
                    playSelectedTrack(playlist.indexOf(song));
                    searchResults.style.display = "none";
                };
                searchResults.appendChild(div);
                searchResults.style.display = "block";
            });
    }

    /* Volume */
    volumeSlider.addEventListener("input", () => {
        audioPlayer.volume = volumeSlider.value;
        localStorage.setItem("volume", volumeSlider.value);
   
    });

    /* Restore state */
    window.onload = () => {
        const vol = localStorage.getItem("volume");
        if (vol) {
            audioPlayer.volume = vol;
            volumeSlider.value = vol;
        }
    };

    audioPlayer.addEventListener("ended", nextTrack);
    loadPlaylist();
</script>

</body>
</html>
